name: Update feeds and deploy

on:
  push:
    branches: [main]
  schedule:
    # 08:17 Asia/Hong_Kong (GitHub Actions cron uses UTC).
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh feed data
        run: npm run update:feeds

      - name: Run tests
        run: npm test

      - name: Run type checks
        run: npm run check

      - name: Build site
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Save scheduled feed refresh
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git add public/data
          if git diff --cached --quiet; then
            echo "Feed data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh feed data [skip ci]"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
